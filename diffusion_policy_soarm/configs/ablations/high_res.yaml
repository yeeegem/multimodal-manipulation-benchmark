# Ablation: native 480x640 resolution.
# Trained for 150 epochs; final loss 0.00298.
# Override base.yaml for re-running or resuming this ablation.
dataset:
  image_size: [480, 640]
  preload_cache: true      # preload images in RAM

training:
  batch_size: 16            # safe for 16 GB VRAM at native resolution with AMP
  num_workers: 2
