# Base configuration for Diffusion Policy on SO-ARM101 redcubes_bluecup task.
# All paths are relative to the repository root unless otherwise noted.
# Override any key with "key=value" on the CLI (dot-notation for nested keys).

dataset:
  path: "recordings/redcubes_bluecup"
  # HuggingFace Hub repo ID. LeRobot downloads metadata and videos from here
  # automatically when the local path is absent. Set to null to disable.
  hf_repo_id: "yeeegem/redcubes_bluecup"
  camera_keys:
    - "observation.images.front"
    - "observation.images.wrist"
  state_key: "observation.state"
  action_key: "action"
  fps: 30
  # Target (H, W) fed to the encoder. Native camera resolution is 640x480 (WxH),
  # so [480, 640] means no resizing: frames pass through at full fidelity.
  # ResNet18 handles arbitrary spatial sizes via global average pool.
  image_size: [480, 640]
  # Load pre-extracted frame cache into RAM (true) or memory-map it (false).
  # The native 480x640 cache is ~60 GB — too large for this 62 GB machine's RAM,
  # so memory-map it. (At 96x96 the cache was ~1.7 GB and could be preloaded.)
  preload_cache: false

model:
  # Policy family: "diffusion" (paper default) or "bc" (Phase 7 MSE baseline).
  # The two share the encoder, data, normalization, and chunked control; they
  # differ only in the action head and loss. See configs/ablations/bc_baseline.yaml.
  type: "diffusion"
  # T_o: how many consecutive observation frames form one conditioning input.
  obs_horizon: 2
  # T_p: length of the predicted action chunk (the denoiser output dimension).
  pred_horizon: 16

encoder:
  backbone: "resnet18"
  pretrained: false         # paper-faithful run: no ImageNet pretraining
  freeze_bn: false          # only relevant when norm_type == "batch"
  norm_type: "group"        # paper-faithful run: GroupNorm in the ResNet backbone
  group_norm_groups: 32
  pool_type: "spatial_softmax"  # paper-faithful run: preserve spatial information
  # Feature vector size per camera after global average pool + linear head.
  feature_dim: 512
  # Linear projection dimension for the proprioceptive state vector.
  state_embed_dim: 64

diffusion:
  # Noise schedule / algorithm only. Used by both the training loss and the
  # inference sampler. Inference-only sampler knobs live in the `infer` block.
  num_train_timesteps: 100
  # "cosine" schedule (Nichol & Dhariwal 2021) is the paper default.
  # Set to "linear" and tune beta_start/beta_end for the DDPM baseline.
  noise_schedule: "cosine"
  beta_start: 0.0001        # only used when noise_schedule == "linear"
  beta_end: 0.02            # only used when noise_schedule == "linear"
  prediction_type: "epsilon" # paper: predict the added noise, not x_0

denoiser:
  # "cnn" = 1-D temporal U-Net with FiLM conditioning (paper default).
  # "transformer" = cross-attention transformer (ablation).
  backbone: "cnn"

  cnn:
    # Channel widths at each U-Net level (doubles at each downsample).
    channels: [256, 512, 1024]
    kernel_size: 5
    # Number of groups for GroupNorm inside the residual blocks.
    n_groups: 8

  transformer:
    n_heads: 8
    n_layers: 6
    d_model: 256
    dropout: 0.1

# Behavior-cloning baseline (Phase 7). Only used when model.type == "bc".
# The MLP head maps the 2176-D conditioning vector to a full (pred_horizon,
# action_dim) chunk in one forward pass, trained with MSE.
bc:
  hidden_dims: [512, 512]
  dropout: 0.0

training:
  seed: 42
  experiment: ""            # set per run: e.g. main_480x640, ablation_96x96
  batch_size: 16            # safe for 16 GB VRAM at native 480x640 with AMP
  num_workers: 2            # native frames are large; fewer workers avoids RAM pressure
  num_epochs: 300
  lr: 1.0e-4
  weight_decay: 1.0e-6
  # "cosine" annealing with a linear warm-up is the paper default.
  lr_scheduler: "cosine"
  warmup_steps: 500
  # EMA decay for the shadow copy of the denoiser weights used at inference.
  ema_decay: 0.9999
  grad_clip: 1.0
  log_every: 100            # gradient steps between TensorBoard log writes
  # Base directory for run outputs; layout: run_dir/experiment/YYYYMMDD_HHMMSS/
  run_dir: "runs"
  # AMP reduces memory usage and speeds up training on modern GPUs.
  use_amp: true

eval:
  # Number of rollout trials per evaluation tier.
  num_trials_per_tier: 30
  tiers: ["A", "B", "C"]
  # Ordered failure categories assigned by first-cause priority.
  failure_categories:
    - "grabbed_nothing"
    - "grasped_wrong_object"
    - "grasp_slip"
    - "missed_cup"
    - "knocked_cup_over"
    - "collision_unsafe"
    - "froze_no_attempt"
    - "timeout"

infer:
  robot_port: "/dev/serial/by-id/usb-1a86_USB_Single_Serial_5B42076683-if00"
  robot_id: "valera"
  # T_a: how many steps of the chunk are actually executed before replanning.
  exec_horizon: 8
  # Diffusion sampling at inference (the training loss never samples).
  # "ddim" = fast, deterministic; "ddpm" = full T-step ancestral.
  sampler: "ddim"
  # Denoising steps per chunk. DDIM uses this many (10 is ~10x faster than full
  # DDPM); DDPM ignores it and always runs the full num_train_timesteps schedule.
  num_inference_steps: 10
  # Clip the x_0 estimate to [-1, 1] at each denoising step.
  clip_sample: true
  # Camera devices — 640x480 native; encoder resizes to dataset.image_size.
  cameras:
    front:
      path: "/dev/v4l/by-id/usb-046d_HD_Pro_Webcam_C920_111DD85F-video-index0"
      width: 640
      height: 480
      fps: 30
      fourcc: "MJPG"   # Motion JPEG: compressed stream, reduces USB bandwidth vs raw YUY2
      backend: 200      # cv2.CAP_V4L2 — forces V4L2 kernel driver; prevents OpenCV from
                        # falling back to GStreamer which adds pipeline latency on Linux
    wrist:
      path: "/dev/v4l/by-id/usb-Sonix_Technology_Co.__Ltd._USB2.0_CAM1_USB2.0_CAM1-video-index0"
      width: 640
      height: 480
      fps: 30
      fourcc: "MJPG"   # Motion JPEG: compressed stream, reduces USB bandwidth vs raw YUY2
      backend: 200      # cv2.CAP_V4L2 — forces V4L2 kernel driver; prevents OpenCV from
                        # falling back to GStreamer which adds pipeline latency on Linux
  # Robot camera name → dataset feature key (must match dataset.camera_keys).
  camera_key_map:
    front: "observation.images.front"
    wrist: "observation.images.wrist"
  # torch.compile: ~30 s one-time warmup, then faster inference on repeated calls.
  compile: true
  # Feetech Acceleration register (raw 0-255). Default ~254 makes motors ramp
  # at near-max rate. Lower values (32-64) make commanded deltas execute more
  # slowly at the firmware level. Written to every motor after robot.connect();
  # persists until power cycle. Set null to leave at the firmware default.
  motor_acceleration: 150
